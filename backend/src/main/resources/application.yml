spring:
  mvc:
    servlet:
      path: /api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auditai}
    username: ${SPRING_DATASOURCE_USERNAME:auditai}
    password: ${SPRING_DATASOURCE_PASSWORD:auditai}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[format_sql]': true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} requestId=%X{requestId} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  api:
    version-prefix: /v1
  ai:
    gemini:
      enabled: ${APP_AI_GEMINI_ENABLED:false}
      api-key: ${APP_AI_GEMINI_API_KEY:}
      model: ${APP_AI_GEMINI_MODEL:gemini-2.5-flash}
      timeout-ms: ${APP_AI_GEMINI_TIMEOUT_MS:15000}
      temperature: ${APP_AI_GEMINI_TEMPERATURE:0.2}
  audit:
    processing:
      exchange: audit.exchange
      routing-key: audit.process
      queue: audit.process
      retry-processing-routing-key-1: audit.process.r1
      retry-processing-queue-1: audit.process.r1
      dlq: audit.process.dlq
      retry-exchange: audit.retry.exchange
      retry-routing-key-1: audit.process.retry.1
      retry-queue-1: audit.process.retry.1
      retry-delay-1-ms: 30000
